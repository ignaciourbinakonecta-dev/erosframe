version: '3.8'
services:
  flowise:
    image: flowiseai/flowise:latest
    container_name: flowise
    ports:
      - "3000:3000"
    environment:
      - FLOWISE_USERNAME=admin
      - FLOWISE_PASSWORD=admin
      - DB_TYPE=sqlite
      - SQLITE_DB_PATH=/root/.flowise/flowise.db
    volumes:
      - ./data:/root/.flowise
    restart: unless-stopped
